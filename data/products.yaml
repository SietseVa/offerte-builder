products:
  Tafels:
    - id: "square_tabletop_inside_untreated"
      name: "Tafelblad rechthoekig, inside, onbehandeld"
      unit: "m2"
      fields:
        - id: "length_cm"
          name: "Lengte (cm)"
          type: "number"
          required: true
        - id: "width_cm"
          name: "Breedte (cm)"
          type: "number"
          required: true
      pricing:
        formula: "square_price * (length_cm / 100) * (width_cm / 100)"
        variables:
          square_price: 380
    - id: "round_tabletop_inside_untreated"
      name: "Tafelblad ronde, inside, onbehandeld"
      unit: "m2"
      fields:
        - id: "diameter_cm"
          name: "Diameter (cm)"
          type: "number"
          required: true
      pricing:
        formula: "base_price + (diameter_price * (diameter_cm / 100) ** 2 * 3.14159 / 4)"
        variables:
          base_price: 100
          diameter_price: 400
    - id: "square_tabletop_koplat_untreated"
      name: "Tafelblad met koplat, onbehandeld"
      unit: "m2"
      fields:
        - id: "length_cm"
          name: "Lengte (cm)"
          type: "number"
          required: true
        - id: "width_cm"
          name: "Breedte (cm)"
          type: "number"
          required: true
      pricing:
        formula: "square_price * (length_cm / 100) * (width_cm / 100)"
        variables:
          square_price: 420
    - id: "complete_table_outside"
      name: "Complete tafel outside"
      unit: "m2"
      fields:
        - id: "length_cm"
          name: "Lengte (cm)"
          type: "number"
          required: true
        - id: "width_cm"
          name: "Breedte (cm)"
          type: "number"
          required: true
        - id: "onderstel"
          name: "Onderstel"
          type: "checkbox"
          required: true
      pricing:
        formula: "square_price * (length_cm / 100) * (width_cm / 100) + (onderstel * onderstel_price)"
        variables:
          square_price: 380
          onderstel_price: 500
    - id: "salontable"
      name: "Salontafel"
      unit: "m2"
      fields:
        - id: "diameter_cm"
          name: "Diameter (cm)"
          type: "number"
          required: true
      pricing:
        formula: "base_price + (diameter_price * (diameter_cm / 100) ** 2 * 3.14159 / 4)"
        variables:
          base_price: 50
          diameter_price: 350
